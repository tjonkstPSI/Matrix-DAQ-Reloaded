# Author: T. Onkst | Date: 04212026
name: "Engine Test Data Recorder"
purpose: "Stream, visualize, and record engine test data from NI cDAQ, CAN/CCP, and Modbus devices; export to Excel."

# Implementation layout: large plugins and core are split across focused modules (see plugin descriptions).
code_layout:
  core:
    orchestrator:
      primary: "src/core/orchestrator.py"
      notes: "Main run loop, plugin coordination, control/telemetry; slimmer than prior monolith after extractions."
    recording:
      path: "src/core/recording.py"
      contains:
        - "begin_recording / end_recording session wiring"
        - "kickoff_export (Excel export kickoff from orchestrator state)"
        - "build_storage_settings and related recording helpers"
  plugins:
    ni_daq:
      primary: "src/plugins/ni_daq.py"
      helpers:
        - path: "src/plugins/_nidaq_discovery.py"
          role: "NI MAX / device enumeration; structured YAML template generation by module family"
        - path: "src/plugins/_nidaq_simulation.py"
          role: "Simulation timestep for configured channels; applies scaling/temp unit conversion"
        - path: "src/plugins/_nidaq_tasks.py"
          role: "DAQmx task construction, chassis-grouped AI task management (one task per CompactDAQ chassis via _chassis_from_device regex); butterworth-mode fast reader (IIR filter + scaling per sample, no deques) and legacy deque-mode reader"
        - path: "src/plugins/_nidaq_acquisition.py"
          role: "Acquisition worker, snapshot buffer, real-mode read/drain path; butterworth path copies pre-computed values from fast reader; cached temp_unit_map; applies scaling/temp unit conversion"
        - path: "src/plugins/_nidaq_scaling.py"
          role: "Shared scaling helpers: apply_scaling (none/linear/table), convert_temp_unit, scaling_summary, IIRFilter (stateful Butterworth low-pass via scipy SOS), presort_scaling_points"
    ccp:
      primary: "src/plugins/ccp.py"
      helpers:
        - path: "src/plugins/_ccp_a2l.py"
          role: "A2L parse (two-pass: COMPU_METHOD COEFFS extraction + MEASUREMENT/CHARACTERISTIC blocks), A2LChannel dataclass with coeffs field, decode_value() with three-stage pipeline (type decode via int.from_bytes/struct.unpack → RAT_FUNC COEFFS inversion via _apply_rat_func_inv → legacy limits fallback). Supports all ASAM types: UBYTE, SBYTE, UWORD, SWORD, ULONG, SLONG, FLOAT32_IEEE, FLOAT64_IEEE."
        - path: "src/plugins/_ccp_protocol.py"
          role: "CCP over CAN session, seed/key, SHORT_UP polling, protocol state. NixnetSession wraps NI-XNET with per-interface queued RX (hardware-filtered FrameInQueuedSession with unique cluster/frame names) and non-blocking recv path (timeout_s=0 for predrain)."
    channel_manager:
      primary: "src/plugins/channel_manager.py"
      notes: "First-class plugin (replaces orchestrator stub); alarms/cadence/segmentation policy."
    engine_test:
      primary: "src/plugins/engine_test.py"
      notes: "First-class plugin (replaces orchestrator stub); run metadata hooks."
    modbus_compat:
      path: "src/plugins/_modbus_compat.py"
      role: "Pymodbus version compatibility shim. Detects installed pymodbus version at import and provides uid_kwargs(unit_id) returning the correct parameter dict (unit= for <3.3, slave= for 3.3-3.9, device_id= for 3.10+). Used by modbus.py, vaisala.py, omega.py, and loadbank.py."
  shared_ui:
    standard_channels:
      path: "src/ui/widgets/standard_channels.py"
      role: "Shared loader for standard channel list (configs/standard_channels.json), ALIAS_PATTERN regex, and validate_alias(). Single point of change when migrating to server-hosted channel list."
    alias_picker:
      path: "src/ui/widgets/nidaq_alias_picker.py"
      role: "Shared AliasPickerDialog used by NI DAQ, CAN, Vaisala, Omega, and Modbus config dialogs. Two tabs: Standard Channels (searchable table from JSON) and Custom (regex-validated free entry)."
    scale_library:
      path: "src/ui/widgets/scale_library.py"
      role: "Shared load_scale_library() loader for configs/scale_library.json. Single server-swap point for future web-based management tool."

stakeholders:
  - "Test Engineers"
  - "Test Cell Operators"

environment:
  os: "Windows 10/11"
  runtime: "Python 3.x (Windows)"
  deployment: "Lab test station"
  dependencies:
    - "PySide6 (UI)"
    - "NI-DAQmx Python"
    - "NI-XNET Python"
    - "pymodbus"
    - "python-can"
    - "cantools"
    - "pyzmq (ZeroMQ)"
    - "numpy, scipy (filters/decimation)"
    - "pandas, sqlite3, pyarrow (legacy Parquet export support)"
    - "openpyxl or xlsxwriter (Excel export)"

constraints:
  timeline_months: 6
  offline_capability: "Local-only; no external dependencies required during operation"

hardware:
  devices:
    - name: "NI cDAQ Chassis + Modules"
      examples: ["NI-9214", "NI-9239", "NI-9375", "NI-9862"]
      interface: "USB/Ethernet"
      protocols: ["DAQmx", "XNET"]
      drivers: ["NI-DAQmx", "NI-XNET"]
    - name: "Vaisala Environmental Sensors"
      interface: "Ethernet"
      protocols: ["Modbus TCP"]
      drivers: []
    - name: "Omega Weather Station"
      interface: "Ethernet"
      protocols: ["Modbus TCP"]
      drivers: []
    - name: "Load Bank"
      interface: "Ethernet"
      protocols: ["Modbus TCP"]
      drivers: []

plugins:
  - id: "NI_DAQ"
    description: "NI cDAQ acquisition (modular: ni_daq.py + _nidaq_discovery, _nidaq_simulation, _nidaq_tasks, _nidaq_acquisition, _nidaq_scaling): discovery helper generates structured YAML (categorized by module family); sim emits configured channels; real path supports AI voltage with configurable oversample (default 10×R) and IIR Butterworth decimation filter (cutoff=R/2, 4th-order SOS) or legacy averaging; AI temperature at R; DI on-demand; chassis-grouped AI tasks (one DAQmx task per CompactDAQ chassis using _chassis_from_device regex, resolving -200022 resource conflicts). Tick rate aligned to core tick from channel_manager.yaml recording_rate_hz (ni_daq.yaml recording_rate_hz deprecated to 'auto'). Butterworth mode eliminates deques: fast reader thread applies filter+scaling per sample, writes pre-computed values to shared dict under brief lock; snapshot worker copies dict only. Channel scaling applied at plugin level (none/linear/table for voltage; C/F/K unit conversion for temp) via shared _nidaq_scaling helpers; table scaling supports optional extrapolation beyond table range; points pre-sorted at config load. Constrained alias system enforces naming convention regex; aliases selected via shared AliasPickerDialog (loads standard channels from configs/standard_channels.json + custom entry with live validation). Premade scales loaded from configs/scale_library.json via shared load_scale_library() helper (server-swap point; read-only from app, managed via separate web tool); searchable picker inside ScalingEditorDialog supports name/description/unit search with formula tooltips. Config dialog double-click opens ScalingEditorDialog (voltage) or TempUnitPickerDialog (temp) with live telemetry preview and scale library import. Disabled channels display blank alias/unit on load. Duplicate alias validation only checks enabled channels. Runtime publishes latest-value snapshots decoupled from core tick. ZMQ PUB/SUB HWM bounded to 10. Hardware migration system: ni_daq.yaml persists device_map (name → product_type); when hardware inventory diverges from config, compute_hardware_diff() classifies old devices by capability and channel count; HardwareMigrationDialog offers only compatible new modules (chassis excluded; type-safe; channel count ≥ old); auto-suggests mappings by matching product_type or AI sub-type; apply_migration() rewrites phys strings preserving config, falls back to regenerate-defaults. DO condition-based output control: each DO has a condition dict (source=own alias, operator including TRUE/FALSE, threshold); orchestrator evaluates all DO conditions every tick using _evaluate_do_conditions(vals) including internal alarm booleans (iOT_AlmSftSdn etc.). Config dialog DO table has Source Channel column (double-click opens DOSourcePickerDialog) and Condition column (double-click opens DOConditionEditorDialog with operator picker, threshold, live value, Force HIGH/LOW/Release buttons)."
    engineering_notes:
      - "Fast-AI robustness: increase device input buffer and adaptively drain based on backlog to avoid -200279 on network cDAQ + NI‑9239"
      - "Future option: move fast‑AI reads to a lightweight acquisition thread per device; continuously drain task buffer into a per-device queue; Core tick consumes latest samples and decimates to n (most recent 10×R) for publication"
      - "Future (queued): optional separate high-speed NI plugin — minimal channel allowlist, dedicated DAQmx task at 500 Hz–1 kHz+ (module-dependent), sidecar files per run under data/high_speed/; main NI_DAQ + channel_manager tick stay slow; see docs/ROADMAP.md Queued section"
  - id: "CAN"
    description: "Multi-bus CAN plugin with tabbed per-bus configuration. YAML schema uses buses[*] with per-bus channel, baudrate, bustype, dbc_path, and signals; legacy single-bus config (session + top-level signals + dbc_path) auto-migrates to buses[0]. Runtime opens one python-can bus per entry, loads one DBC per bus, and drains frames from all buses in the snapshot loop. CAN configure dialog (can_config.py) uses QTabWidget with Add Bus / Remove Bus buttons; each tab has channel, baudrate, DBC path, signal filter, and signal table with checkbox/message/signal/unit/alias columns. Double-click Alias column opens shared AliasPickerDialog (standard channels from JSON + custom). Alias validation on save enforces standard naming convention and global uniqueness across all buses. Blank aliases on checked signals are blocked on save. Real-mode DBC decode with J1939 PGN-aware fallback matching and runtime diagnostics channels (frames_rx/decode_hits/last_decode_age_s). Sim/real mode is controlled globally via the launch dialog Offline Mode checkbox, not per-plugin."
  - id: "CCP"
    description: "CCP over CAN (read-only; modular: ccp.py + _ccp_a2l, _ccp_protocol): import A2L, configure bus/session, algorithmic access-key unlock, select measurements (use A2L names) with optional global naming prefix. A2L parser extracts COMPU_METHOD COEFFS (RAT_FUNC conversion coefficients) for proper raw-to-physical conversion; decode_value() handles all ASAM types including FLOAT32_IEEE via struct.unpack, signed SLONG/SBYTE, and ULONG with COEFFS-based scaling. Supports multi-device configuration for up to two ECMs using devices[*] with Primary/Secondary role mapping to station_address 0x0/0x1. Parallel worker threads (one per device, default) enable concurrent SHORT_UP polling across buses (~3.3x combined throughput vs single-thread). Per-device values written to thread-local dicts and merged into global snapshot under _state_lock. NixnetSession uses per-interface unique cluster/frame names for FrameInQueuedSession (hardware-filtered RX) and supports non-blocking recv (timeout_s=0) for predrain. SHORT_UP timeout configurable per-device via short_up_timeout_s (default 30ms, clamped 5-50ms). Timing diagnostics track predrain/send/recv-loop/slop per attempt with rolling window summaries. Runtime is decoupled from core tick via latest-value snapshot buffering and exposes freshness telemetry."
  - id: "Calculated_Channels"
    description: "Calculated channels evaluated using safe expressions. Supports user-defined simple symbols mapped to full source aliases to simplify expressions; evaluated in listed order; outputs recorded under full aliases. Runtime now computes in a background snapshot loop and serves latest values to core tick."
  - id: "Cycle"
    description: "Load bank control from CSV (Time kW) step schedule (no interpolation), pause/stop/restart/skip, looping; drives LoadBank setpoint; end-of-cycle stops issuing commands (operator control). Config UI includes embedded QtCharts staircase plot preview (step/hold visualization matching load bank behavior), BOM-safe CSV parsing (utf-8-sig), and status summary (point count, loops, cycle duration)."
  - id: "LoadBank"
    description: "Load bank control via Modbus TCP: model dropdown, IP config, connection test, auto-connect/keep-alive; setpoint/accept; status reads; units derived from model map (kW typical)"
  - id: "Modbus"
    description: "Custom Modbus channel framework with TCP/RS485 configuration UI, per-channel mapping table, and test value display. Supports multi-device tabbed config persisted in devices[*] with runtime fallback compatibility to legacy flattened reads. Real mode uses full Modbus TCP transport (_ServerConnection class with ModbusTcpClient, _decode_registers for float/int conversion with byte/word order, multi-server polling with scaling). Sim mode generates phase-shifted sine waveforms. Publishes Modbus/conn_ok health channel for console status. Double-click Alias column opens shared AliasPickerDialog; alias validation on save. Global sim/real mode controlled by launch dialog Offline Mode, not per-plugin."
  - id: "Statistics"
    description: "Secondary logger of stats (mean, stdev, min, max) with rolling/fixed windows and optional triggers. Runtime processing is decoupled from core tick through queued updates and background processing. Config UI (right-click configure) covers window settings, metrics selection, auto-trigger, and per-channel overrides."
  - id: "Vaisala"
    description: "Vaisala humidity transmitter (HMT330 / Indigo510) via Modbus TCP. Reads float32 holding registers for 13 measurement channels (RH, T, Td, Td/f, a, x, Tw, H2Ov, pw, pws, H, dT, H2Ow) with a hardcoded REGISTER_MAP. Writes pressure compensation (fixed hPa or dynamic from any telemetry channel with gain/offset) to temporary register 771-772 and filtering flags (None/Std/Ext) to registers 1281/1282 every poll cycle. Orchestrator feeds merged telemetry via update_telemetry(vals) for dynamic pressure. Threaded poll loop with configurable rate and auto-reconnect. Sim mode provides sine-wave values per channel. Config UI has model dropdown (auto-sets unit_id: HMT330=1, Indigo510=241), checkbox-based channel selection with read-only aliases (blank by default, double-click opens shared AliasPickerDialog), pressure/filtering groups, and connection settings. Sim/real mode is controlled globally via the launch dialog Offline Mode checkbox, not per-plugin."
  - id: "Omega"
    description: "Omega weather station via Modbus TCP. Reads 3 fixed channels (temp addr 8, baro addr 10, humidity addr 12) as big-endian float32 from holding registers in a single bulk read. Handles Omega-specific error/NaN sentinel codes (0x7F800000-03) which are reported as NaN in telemetry. Default aliases xTP_Amb (C), xPR_Amb (kPa), xHM_Amb (Pct) are user-configurable via a table in the config dialog (ID/Unit/Alias columns, double-click Alias column opens shared AliasPickerDialog). Aliases persist in omega.yaml channels block. Threaded poll loop with auto-reconnect. Config dialog exposes host/port; poll rate and timeout stay in YAML for super-users."
  - id: "EngineTest"
    description: "Collects run metadata (lock-test fields); implemented in src/plugins/engine_test.py (no longer an orchestrator stub)."
  - id: "Channel_Manager"
    description: "Configure core recording cadence and segmentation policy, plus two-tier per-channel warning/alarm behavior with enabling conditions, per-limit latching, action selection, and per-channel shutdown_type (hard/soft). AlarmEngine returns any_soft_shutdown/any_hard_shutdown/engine_running in summary. Orchestrator publishes internal booleans each tick: iOT_Warning, iOT_Alarm, iOT_AlmSftSdn, iOT_AlmEmgSdn, iDG_EngRunStp — available to DO condition evaluation for relay-driven shutdown circuits. UI has Shutdown Type column (Hard/Soft dropdown). Implemented in src/plugins/channel_manager.py."

workflows:
  - id: "WF-SESSION"
    name: "Session setup"
    trigger: "User"
    steps:
      - "Show splash screen with version and logo while loading"
      - "Launch configuration dialog: select plugins, choose data root folder, enter Test Cell name, toggle Offline Mode (global sim for all selected plugins), optional: import previous configuration"
      - "On 'Launch': apply selections, write data_mode to plugins.yaml, start the core subprocess from the UI launcher"
      - "Launcher waits for core_ready status over ZeroMQ before opening Console; core_ready means IPC/status loop is alive and plugins have been configured/started as far as possible, not that external hardware is connected"
      - "Orchestrator reads data_mode at startup and on reload; when offline, forces every plugin.mode=sim and restarts plugins dynamically if the global toggle changes mid-session"
      - "Console shows plugin health (green/red)"
      - "Streaming starts (not recording)"
  - id: "WF-LOCK_START_STOP"
    name: "Lock and run"
    steps:
      - "Lock test: prompt EngineTest metadata; capture Pre-Test Comments"
      - "Start Test: begin recording at rate R (≤100 Hz)"
      - "Segment rollover by time or size when thresholds exceeded"
      - "Stop Recording: prompt Post-Test Comments"
      - "Stop Test: finalize and move from temp to final folder"
      - "Offer Excel export (split into .1, .2 … if row limit exceeded)"
      - "For new run: lock again, update metadata, start"
  - id: "WF-ERROR_RECOVERY"
    name: "Error handling"
    steps:
      - "On device error: retry/backoff per plugin"
      - "On critical fault: fail-safe stop; preserve committed data; allow export on restart"

inputs:
  - id: "IN-CDAQ"
    type: "cDAQ channels"
    schema: "Module/channel, constrained alias, scaling (none/linear/table for voltage; C/F/K for temp), range, rate; voltage channels oversample at configurable factor×R with Butterworth decimation filter (default) or averaging"
  - id: "IN-CAN"
    type: "CAN/CCP"
    schema: "DBC/XML, A2L + access-key unlock inputs provided by operator"
  - id: "IN-MODBUS"
    type: "Modbus TCP"
    schema: "Register maps (TBD)"

outputs:
  - id: "OUT-DATA"
    type: "SQLite time-series segment database(s) + YAML metadata"
    schema: "Recording grid at R; plugin values sampled from each plugin's latest snapshot at tick time (sample-and-hold); includes Time_Relative_s (s) and internal boolean channels (iOT_Warning, iOT_Alarm, iOT_AlmSftSdn, iOT_AlmEmgSdn, iDG_EngRunStp); statistics outputs separate. Debug channels (CAN/, CCP/, Core/, EngineTest/, NI_DAQ/ prefixes) are stripped at publish boundary via _strip_debug_keys() but */health_ok and */conn_ok are preserved for console health display."
  - id: "OUT-EXCEL"
    type: "Excel export"
    schema: "Per-data-segment workbook(s) with sheets: Metadata (includes units matrix), Data (autosize, 2-decimal display), AlarmEvents, StatsSnapshots; split a single file into .1, .2 if exceeding Excel row limit"
  - id: "OUT-LOGS"
    type: "Run logs"
    schema: "Structured text with rotation; per-run directory"
  - id: "OUT-ALARM-EVENTS"
    type: "Alarm events (JSONL)"
    schema: "Per-run JSON Lines file alarm_events.jsonl with fields: ts_hms, alias, from, to, value"
  - id: "OUT-RUN-FOLDER"
    type: "Run artifact bundle"
    schema: "Folder named after base; contains data, metadata, logs, and config snapshots for reproducibility"

requirements:
  functional:
    - id: "FR-001"
      priority: "MUST"
      statement: "Record up to 200 channels at user-selected R ≤ 100 Hz; fast channels oversampled 10×R and decimated to R."
    - id: "FR-002"
      priority: "MUST"
      statement: "Near real-time visualization with up to 20 Hz UI refresh; plotting decoupled from recording."
    - id: "FR-003"
      priority: "MUST"
      statement: "Support CAN (XNET), CCP via A2L + seed/key DLL, and Modbus TCP read/write."
    - id: "FR-004"
      priority: "SHOULD"
      statement: "Calculated channels using restricted Python expressions; optional script channels later."
    - id: "FR-005"
      priority: "MUST"
      statement: "Excel export with metadata sheet and data sheet; handle row limits by splitting files (.1, .2 …)."
    - id: "FR-006"
      priority: "MUST"
      statement: "Warn when disk free space < 5 GB; do not block run."
    - id: "FR-007"
      priority: "MUST"
      statement: "Console 'Start Test' blocked until all selected plugins are green."
    - id: "FR-008"
      priority: "MUST"
      statement: "Support time- or size-based segmentation; apply _1, _2 … only when segmentation occurs."
    - id: "FR-009"
      priority: "SHOULD"
      statement: "Statistics plugin emits mean/stdev/min/max at rate R with configurable windows and triggers."
    - id: "FR-010"
      priority: "MUST"
      statement: "On Stop Recording, prompt user with Post-Test Comments dialog."
    - id: "FR-011"
      priority: "MUST"
      statement: "Operator can view/reset plugin errors via UI (e.g., right-click 'Show Error' / 'Reset Error'); 'Configure' via context menu."
    - id: "FR-012"
      priority: "MUST"
      statement: "Per-plugin YAML configuration files; snapshot copies bundled with each run for reproducibility."
  nonfunctional:
    - id: "NFR-001"
      category: "Reliability"
      statement: "Crash-safe writes; worst-case data loss < 1 s; recovery/export after restart."
    - id: "NFR-002"
      category: "Performance"
      statement: "Sustain 4 h runs with segmentation; UI latency ≤ 100 ms."
    - id: "NFR-003"
      category: "Security"
      statement: "Local-only operation; disable external connections by default; no secrets storage."
    - id: "NFR-004"
      category: "Maintainability"
      statement: "Plugin lifecycle with validation and health reporting; YAML config with schema validation; per-plugin files."

states:
  machine: ["Init", "Configuring", "ConsoleReady", "Locked", "Recording", "SegmentRollover", "Stopping", "Exporting", "Completed", "Error"]
  transitions:
    - { from: "ConsoleReady", to: "Locked", on: "Lock test (metadata OK)" }
    - { from: "Locked", to: "Recording", on: "Start Test (all green)" }
    - { from: "Recording", to: "SegmentRollover", on: "Time/size limit exceeded" }
    - { from: "Recording", to: "Stopping", on: "Stop Recording (Post-Test Comments)" }
    - { from: "Stopping", to: "Exporting", on: "Finalize files" }
    - { from: "Exporting", to: "Completed", on: "Export done" }
    - { from: "Any", to: "Error", on: "Critical fault" }

timing:
  recording_rate_R_hz_max: 100
  plotting_update_rates_hz: [1, 5, 10]
  fast_channels:
    definition: "Analog voltage (and optionally current)"
    acquisition: "Hardware sample at configurable factor×R (default 10×); anti-aliased via 4th-order IIR Butterworth (default) or averaging; decimate to R for storage"
  other_sources:
    definition: "TC/RTD/CAN/CCP/Modbus"
    acquisition: "Plugin-local acquisition loops; core samples latest available value at R grid (decoupled)"
  decimation_filter: "Low-pass (FIR/IIR) with cutoff < R/2"
  decimation_filter_default: "4th-order IIR Butterworth"

synchronization:
  daqmx: "Shared hardware timebase and start trigger across relevant tasks"
  can_xnet: "Use XNET hardware timestamps; align to R grid; if clock skew observed, apply periodic offset re-alignment (log applied offset)"
  modbus: "Host-timestamped; hold last value between updates"

config:
  canonical_format: "YAML"
  per_plugin_files: true
  file_examples:
    - "configs/ni_daq.yaml"
    - "configs/can.yaml"
    - "configs/ccp.yaml"
    - "configs/calculated_channels.yaml"
    - "configs/cycle.yaml"
    - "configs/loadbank.yaml"
    - "configs/modbus.yaml"
    - "configs/statistics.yaml"
    - "configs/vaisala.yaml"
    - "configs/engine_test.yaml"
    - "configs/channel_manager.yaml"
    - "configs/plugins.yaml"  # launch selections persisted here
  parameters:
    - "Channel sets"
    - "Rates"
    - "Metadata fields"
    - "Calculated expressions"
    - "Segmentation policy"
    - "Watchdog settings (optional)"
    - "Per-plugin enable/disable (enabled: true|false)"
    - "Launch defaults: selected plugins, data root, Test Cell, data mode (real|sim)"
    - "Launch selections persisted to configs/plugins.yaml (do not persist sim override)"
  storage_locations:
    temp_runs: "C:\\ProgramData\\PSI\\Test Data"
    final_runs: "User-selected local folder"
  validation: "Schema-validated where applicable (TBD schema files)"
  snapshot_policy:
    when: ["On Start Test (locked config)", "On Stop Test"]
    destination: "Run folder under config_snapshot/ (per-plugin YAML copies)"
  core:
    run_mode: "demo | continuous"
    tick_interval_s: "publish interval (e.g., 0.1 for 10 Hz). Drives telemetry/record row cadence; recommended align to 1/R"
    plugin_enablement:
      description: "Two-gate enablement: orchestrator loads selected_plugins from configs/plugins.yaml (written by launch dialog) and each plugin's own config enabled field. A plugin runs only if it appears in selected_plugins AND its config does not have enabled: false. Channel_Manager and EngineTest are always-on. Falls back to all-enabled if plugins.yaml is missing. Disabled plugins are skipped for configure/start, alias aggregation, and runtime steps. Runtime changes are fully supported: ConsoleWindow sends sync_plugin_selections on connect; orchestrator _sync_all_plugin_selections() re-reads plugins.yaml, diffs all plugins, starts newly-enabled and stops newly-disabled. Per-plugin _reload_plugin also re-reads via _refresh_plugin_selection(). Both tick loops re-resolve plugin references each iteration so changes take effect on the next tick."

logging:
  level_default: "info"
  diagnostics_mode: "debug (optional)"
  retention_policy: "Keep last 5 runs"
  structure: "Per-run log directory; include plugin health and alarm events"
  operator_visibility:
    plugin_error_context_menu: ["Configure", "Show Error", "Reset Error"]

storage:
  format: "SQLite segment database(s) (.db) + run-level YAML metadata (.yaml)"
  segmentation:
    enabled: true
    by: ["time", "size"]
    time_limit_default_h: 4
    size_limit_default_mb: 100
    naming: "Apply _1, _2, … only when segmentation occurs; first segment is _1"
  temp_path: "C:\\ProgramData\\PSI\\Test Data"
  finalize_on_stop: "Move to user-configured final folder"
  run_folder_structure:
    folder_name: "MMDDYY_HHMMSS_EngineType_TestType"
    contents:
      - "data/seg_*.db (one per segment)"
      - "metadata.yaml (run-level)"
      - "config_snapshot/*.yaml (copies of per-plugin configs used)"
      - "logs/*.log"
      - "data/Data_<run>*.xlsx (automatic export)"
  crash_safety:
    write_mode: "SQLite WAL append with buffered commits; no post-run Parquet coalesce for current runs"
    commit_interval_s: 2
    worst_case_loss_s: "Approximately the configured commit interval"
    recovery: "Recover last committed SQLite rows on restart"
  excel_export:
    enabled: true
    sheets: ["Metadata", "Data", "AlarmEvents", "StatsSnapshots"]
    time_columns: ["Time_Relative_s", "Time_Absolute_iso8601"]
    row_limit_behavior: "One workbook per SQLite segment database; split a single file into .1, .2, … when exceeding Excel row limit (~1,048,576)"
    naming_examples:
      no_seg: "MMDDYY_HHMMSS_EngineType_TestType.xlsx"
      seg2_split: "MMDDYY_HHMMSS_EngineType_TestType_2.1.xlsx"
  disk_guardrail:
    min_free_gb: 5
    behavior: "warn_only"

tools:
  post_run:
    - name: "inspect_parquet"
      path: "src/tools/inspect_parquet.py"
      usage: "py -m src.tools.inspect_parquet [--run runs/...] [--show-head N]"
      purpose: "Legacy utility for old Parquet-format runs"
    - name: "export_excel"
      path: "src/tools/export_excel.py"
      usage: "py -m src.tools.export_excel [--run runs/...] [--engine openpyxl|xlsxwriter] [--rows-per-file N] [--output-dir PATH]"
      purpose: "Create Excel workbook(s) with sheets: Metadata, Data, AlarmEvents, StatsSnapshots; auto-split when exceeding row limits. Default output is <run>/data next to the SQLite segment database(s). Automatically kicked off by the orchestrator after recording stops; the console no longer exposes a manual Export button."

filenaming:
  base: "MMDDYY_HHMMSS_EngineType_TestType"
  segment_suffix: "Apply _1, _2, … only if segmented"
  excel_split_suffix: "Apply .1, .2, … only if row-limit split"
  statistics_postfix: "_Statistics"

  alarms:
    units: "Derived from post-scaling units per channel"
    types: ["warn_high", "warn_low", "shut_high", "shut_low"]
    shutdown_type: "Per-channel hard (default) or soft; determines which internal boolean is raised (iOT_AlmEmgSdn vs iOT_AlmSftSdn)"
    debounce:
      enter_delay_s: "<per-limit configurable; time non-OK must persist to enter WARN/SHUT>"
      clear_delay_s: "<per-limit configurable; time OK must persist to clear back to OK>"
      legacy_keys_supported: ["latch_on_s", "unlatch_after_s"]
    actions:
      warning:
        - "UI_indicator_yellow"
        - "log_event"
      alarm:
        - "UI_indicator_red"
        - "log_event"
        - "optional_shutdown_request_when_action_is_visible_alert_shutdown"
    internal_booleans:
      - "iOT_Warning: any channel in WARN state"
      - "iOT_Alarm: any channel in SHUT state"
      - "iOT_AlmSftSdn: any soft-shutdown channel in SHUT state"
      - "iOT_AlmEmgSdn: any hard/emergency-shutdown channel in SHUT state"
      - "iDG_EngRunStp: engine running (RPM > threshold)"
    logging:
      format: "jsonl"
      file_name: "alarm_events.jsonl"
      fields: ["ts_hms", "alias", "from", "to", "value"]

metadata:
  lock_test_required_fields:
    - name: "Engine Type"
      type: "enum"
      values: ["4X", "8.8L", "14L", "22L", "32L", "53L"]
    - name: "Engine Serial Number"
      type: "string"
    - name: "Test Type"
      type: "enum"
      values: ["Standard Break In", "Durability", "Spark Sweep", "Vibration", "Other"]
    - name: "Test Operator"
      type: "string"
    - name: "Project Number"
      type: "string"

calculated_channels:
  engine: "Safe AST evaluator (no imports/I/O), arithmetic, comparisons, boolean ops, selected math funcs"
  symbols:
    description: "Each calculation defines simple symbols that map to full source aliases (or constants); expressions use simple symbols"
  allowed:
    functions: ["abs", "min", "max", "pow", "round", "sin", "cos", "tan", "exp", "log", "sqrt"]
  disallowed: ["I/O", "filesystem", "network", "imports", "attribute access", "indexing"]
  evaluation_order: "top-to-bottom in config; prior calculated aliases may be referenced via symbols"
  outputs: "Recorded under full output alias names; units optional per item"
  estop_implementation: "Per-cell logic using digital inputs and IF expressions; configurable per site"

statistics_plugin:
  rate: "Match recording rate R"
  snapshots:
    window: "seconds or samples; min_samples configurable"
    manual_logging: "operator button to capture one row"
    automatic_logging:
      trigger: "channel comparator threshold"
      edge: "rising or falling; only logs on configured edge crossing"
      holdoff_s: "optional re-arm delay"
    capture_mode: "backward (trailing) or forward (future capture)"
    notify_on_skip: "operator notification when skipped due to insufficient samples"
  metrics: ["mean", "stdev", "min", "max", "p2p"]
  selection:
    global_defaults: "metrics.selected in statistics.yaml"
    per_channel_override: "channels[*].stats can override the global list"
  output_naming_postfix: "_Statistics"
  segmentation_and_excel_split: "Same rules as primary data"

cycle_loadbank:
  cycle_file_format: "CSV"
  csv_schema:
    columns: ["Time", "Load"]
    notes: "Fan is always on; no column"
  controls: ["pause", "stop", "restart", "skip"]
  looping:
    loops_total_default: 1
    inter_loop_dwell_s_default: 0
    between_loops_safe_state: false
  comms_loss_behavior: "Trigger E-stop circuit; abort current loop"
  engine_shutdown: "Digital output to engine controller (behavior via calculated channels/logic)"
  polling_and_limits: "TBD (register maps, scaling, rates, safeguards)"

ui:
  architecture: "Two-process bundle: Core (acquisition) + UI (PySide6)"
  ipc:
    transport: "ZeroMQ (local-only)"
    patterns:
      telemetry: "PUB/SUB for live frames"
      control: "REQ/REP for operator commands"
    payloads: ["JSON", "MessagePack"]
  displays:
    templates:
      - "AllChannelsTable (grouped by type) — auto-categorized via alias prefix into side-by-side panels with FlowLayout reflow"
      - "MainTestMonitor (live plot + watch table + AO controls) — pyqtgraph rolling plot with up to 4 Y axes, configurable watch table, AO write panel, standard test info, alarm terminal"
      - "PlotsBlank (user selects channels)"
      - "DialsGauges (configurable)"
    update_rates_hz: [1, 5, 10, 20]
    multi_window: true
    alarm_colors:
      warning: "yellow"
      alarm: "red"
  status:
    connection_indicator: "Connected/Disconnected via freshness of telemetry (< 1 s)"
    splash_screen:
      shows: ["Logo", "Version string"]
      duration: "until Core + UI ready"
    launch_configuration_dialog:
      fields: ["Plugin multi-select", "Select Data Displays (up to 2)", "Data root (folder browser)", "Test Cell (text)", "Data mode (real|sim)", "Import configs from previous run (file dialog)"]
      actions: ["Launch", "Exit"]
      behavior:
        - "Launch applies selections (including setting per-plugin mode=sim at runtime only when data mode=sim) and opens Console; selected Data Displays open as separate windows"
        - "Exit closes the application"
    console:
      indicators: ["Recording (on/off)", "Current status (Ready/Idle, Locking, Locked, Test Running, Saving)", "Last error message"]
      status_label_mapping:
        Ready/Idle: ["ConsoleReady"]
        Locking: ["Configuring"]
        Locked: ["Locked"]
        Test Running: ["Recording", "SegmentRollover"]
        Saving: ["Stopping", "Exporting"]
  plugin_tiles:
    right_click_menu: ["Configure", "Show Error", "Reset Error"]
    configure_wired: ["NI_DAQ", "CCP", "CAN", "Modbus", "LoadBank", "Calculated_Channels", "Channel_Manager", "Statistics", "Vaisala", "Omega", "Cycle"]
    health_colors: { green: "OK/valid (health_ok=True or conn_ok=True)", red: "Error (health_ok=False) or Disconnected (conn_ok=False)", grey: "No health data, falls back to config validity" }
  controls:
    primary: ["Lock Test", "Start Recording", "Stop Recording", "Unlock Test (pre-recording escape hatch)", "Log Statistics (manual)"]
    primary_button: "Stateful: Lock Test → Start Recording → Stop Recording"
    unlock_button: "Visible only when locked-and-not-recording; confirms via dialog, then sends unlock_test and returns primary to 'Lock Test' so metadata can be re-entered"
    export_workbook: "Removed from UI; Excel export runs automatically after Stop Recording → SQLite finalize → export_excel writes to <run>/data alongside the SQLite segment database(s)"
    restore_displays: "Always-enabled button; re-reads selected_displays from plugins.yaml, recreates any closed display windows via _create_display(key) factory, brings already-open ones to front; Messages pane confirms action"
    status_bar: "Connected/Disconnected | Locked/Unlocked | Recording: On/Off — same green/grey colour pattern (green = active, grey = idle)"
    console_actions:
      - "Close Plugins: closes Console and all display windows, returns to Launch Configuration"
    loadbank: ["fan_on_off (always on policy)", "setpoint", "accept"]
    analog_out: ["selected 0–10 V channels"]
  configure_dialogs:
    behavior:
      - "Per-plugin Configure opens a dialog reflecting that plugin's YAML; save writes back to configs/<plugin>.yaml"
      - "Validation errors are shown inline; on save success, plugin may be reloaded or flagged for relaunch depending on change scope"

error_handling:
  io_retry: "Per plugin retry with backoff"
  critical_fault: "Fail-safe stop; preserve committed data; notify user"
  resume_policy: "User-driven after faults; health must be green to proceed"

system_health:
  watchdog:
    ni_daq:
      enabled: true
      notes: "Health worker tracks consec_failures and last_good_read_age_s; failures increment only when no device read succeeds in a tick; warm-up window suppresses early counts. Optional telemetry channels exposed via config."
      modes:
        driver:
          refresh_rate_hz_default: 2
          timeout_ms_default: 1000
          supported_devices: ["NI-9188", "NI-9189"]
        digital_loopback:
          do_line: "TBD (per site)"
          di_return: "TBD (per site)"
          toggle_rate_hz_default: 2
          verify_timeout_ms_default: 250
          miss_threshold_default: 3
      behavior_on_fault: ["Mark NI_DAQ red", "Raise system fault", "Optional: trigger E-stop via calculated channel"]

safety_and_compliance:
  hazards: ["Unsafe output states", "Load bank misconfiguration", "ECU unlock misuse"]
  mitigations:
    - "Alarms with latching and shutdown actions"
    - "Per-cell E-stop logic via calculated channels"
    - "Start blocked until all plugins green"
  estop:
    implementation: "Calculated-channel-based using DI + IF logic"
    per_cell_variation: true

security:
  posture: "Local-only"
  external_connections: "Disabled by default"
  secrets: "None stored"

migration_notes:
  from_labview:
    - "Match or exceed prior behavior"
    - "Gather VI screenshots and quirks (TBD)"
  dependencies_and_versions: "A2L + seed/key DLL versions provided by operator (TBD)"

definition_of_done:
  - "Feature parity with prior system (or better)"
  - "All FR/NFR mapped to tests in RTM"
  - "Build reproducible on target machine"
  - "Excel export validated against large runs"

versioning: "SemVer MAJOR.MINOR.PATCH; pre-release allowed"

open_questions:
  cdaq_channel_inventory: "TBD (names, ranges, accuracies, groupings, triggers)"
  can_ccp_unlock_flow: "TBD (detailed sequence, retries/timeouts)"
  modbus_register_maps: "TBD (addresses, types, scaling, rates, safeguards)"
  ui_templates_final: "TBD (provide screenshots and preferred layouts)"
  segmentation_size_limit_mb: "TBD (user-configurable default)"
  schema_files: "TBD (JSON Schema/YAML for config validation)"


