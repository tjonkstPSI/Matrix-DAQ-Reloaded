# Author: T. Onkst | Date: 04212026
model: "Simplex 750kW"

# Vendor map addresses are entered as one-based.
address_base: 1

commands:
  # B-side write block:
  # write coils start=3484, count=3 -> Take Control B, Fan/Control Power B, Master Load B
  control_enable_a:
    fc: 15
    address: 3485
    values: [true, true, true]
    labels: ["Take Control B", "Fan/Control Power B", "Master Load B"]

  # B-side setpoint write block:
  # write coils start=3472 -> logical step coils 3473..3484 (12 values).
  setpoint:
    fc: 15
    address: 3473
    type: coil_array
    ui_unit: "kW"
    # B-bank step values aligned to controls table 3473..3484.
    steps_kw: [1, 2, 2, 5, 5, 10, 25, 50, 50, 100, 200, 300]
    logical_addresses: [3473, 3474, 3475, 3476, 3477, 3478, 3479, 3480, 3481, 3482, 3483, 3484]
    compose: greedy_descending
    min: 0
    max: 750
    confirm_readback: false

  # B-side fan coil
  fan_power:
    fc: 6
    address: 3487
    type: uint16
    min: 0
    max: 1

status:
  # B-side metering read block: start 2817, count 16 -> 8 float32 values (BA word order).
  # Channel order: Vab, Vbc, Vca, Ia, Ib, Ic, kW, Hz
  voltage_ab_vrms:
    fc: 3
    address: 2817
    type: float32
    word_order: BA
    scaling: { m: 1.0, b: 0.0, unit: "Vrms" }
    alias_key: voltage_ab_alias
    poll_hz: 5
  voltage_bc_vrms:
    fc: 3
    address: 2819
    type: float32
    word_order: BA
    scaling: { m: 1.0, b: 0.0, unit: "Vrms" }
    alias_key: voltage_bc_alias
    poll_hz: 5
  voltage_ca_vrms:
    fc: 3
    address: 2821
    type: float32
    word_order: BA
    scaling: { m: 1.0, b: 0.0, unit: "Vrms" }
    alias_key: voltage_ca_alias
    poll_hz: 5
  current_l1_a:
    fc: 3
    address: 2823
    type: float32
    word_order: BA
    scaling: { m: 1.0, b: 0.0, unit: "A" }
    alias_key: current_l1_alias
    poll_hz: 5
  current_l2_a:
    fc: 3
    address: 2825
    type: float32
    word_order: BA
    scaling: { m: 1.0, b: 0.0, unit: "A" }
    alias_key: current_l2_alias
    poll_hz: 5
  current_l3_a:
    fc: 3
    address: 2827
    type: float32
    word_order: BA
    scaling: { m: 1.0, b: 0.0, unit: "A" }
    alias_key: current_l3_alias
    poll_hz: 5
  power_kw:
    fc: 3
    address: 2829
    type: float32
    word_order: BA
    scaling: { m: 1.0, b: 0.0, unit: "kW" }
    alias_key: measured_load_alias
    poll_hz: 5
  frequency_hz:
    fc: 3
    address: 2831
    type: float32
    word_order: BA
    scaling: { m: 1.0, b: 0.0, unit: "Hz" }
    alias_key: frequency_alias
    poll_hz: 5

  # Indicator read block: shared coils (same addresses as A-side).
  control_available:
    fc: 1
    address: 3521
    type: coil
    alias_key: control_available_alias
    poll_hz: 2
  fan_on:
    fc: 1
    address: 3522
    type: coil
    alias_key: fan_alias
    poll_hz: 2
  normal_operation:
    fc: 1
    address: 3523
    type: coil
    alias_key: normal_operation_alias
    poll_hz: 2
  load_available:
    fc: 1
    address: 3524
    type: coil
    alias_key: load_available_alias
    poll_hz: 2
  load_bank_failure:
    fc: 1
    address: 3525
    type: coil
    alias_key: loadbank_failure_alias
    poll_hz: 2

  # VI-style outputs mapped from indicator coil positions.
  power_bool:
    fc: 1
    address: 3522
    type: coil
    alias_key: power_alias
    poll_hz: 2
  error_bool:
    fc: 1
    address: 3525
    type: coil
    alias_key: error_alias
    poll_hz: 2
