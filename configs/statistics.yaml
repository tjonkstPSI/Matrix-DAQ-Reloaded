enabled: true
snapshot:
  window:
    seconds: 5.0
    samples: null
  capture_mode: backward
  notify_on_skip: true
metrics:
  selected:
  - mean
  - stdev
  - min
  - max
  - p2p
manual_logging:
  enabled: true
automatic_logging:
  enabled: false
  trigger:
    channel: Room Temp
    comparator: '>'
    threshold: 25.0
    edge: rising
    holdoff_s: 0.0
output:
  format: wide
  enable_excel_export: false
  excel_per_stat_sheet: true
channels: []
recording_rate_hz: 10
