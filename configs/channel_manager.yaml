# Minimal example thresholds to smoke UI coloring
channels:
  - alias: "Room Temp"
    high_warning: 50
    high_shutdown: 75
    enter_delay_s: 0.0
    clear_delay_s: 0.0
  - alias: "LB Measured Load"
    high_warning: 150
    high_shutdown: 200
    enter_delay_s: 0.0
    clear_delay_s: 0.0

# Author: T. Onkst | Date: 08122025

recording_rate_hz: 10

aggregation:
  emit_summary_channels: false

output:
  alarm_events:
    enabled: true
    format: jsonl
    file_name: alarm_events.jsonl
    fields: ["ts_hms", "alias", "from", "to", "value"]


