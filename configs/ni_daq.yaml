# Author: T. Onkst | Date: 08122025
enabled: true

mode: real # real or sim
recording_rate_hz: 100

health: { poll_hz: 2, read_fail_warn_threshold: 10, read_fail_fault_threshold: 30, expose_status_channels: true }
acquisition:
  read_timeout_margin_s: 0.5

watchdog:
  enabled: false            # Set true to enable when hardware is available
  mode: driver              # driver | digital_loopback
  refresh_rate_hz: 2        # driver mode
  timeout_ms: 1000          # driver mode
  expir_states: {}          # optional mapping of DO alias -> 0|1 safe state on watchdog expiry

decimation:
  filter: IIR_Butterworth
  cutoff_hz: auto
