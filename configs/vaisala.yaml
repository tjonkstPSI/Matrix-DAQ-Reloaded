# Author: T. Onkst | Date: 08122025
enabled: true

mode: sim
recording_rate_hz: 10

connection:
  host: 127.0.0.1
  port: 502
  unit_id: 1

model:
  selected: "HMT330"           # example model id; for sim it is informational
  map_file: null               # future: path to register map yaml for real device

polling:
  override_poll_hz: null

calibration_offsets: { "Ambient Temp": 0.0, "Ambient RH": 0.0, "Ambient Pressure": 0.0 }

channels:
  - alias: "Ambient Temp"
    unit: "C"
  - alias: "Ambient RH"
    unit: "%RH"
  - alias: "Ambient Pressure"
    unit: "kPa"


